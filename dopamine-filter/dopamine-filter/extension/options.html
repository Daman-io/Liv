<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Mindful Feed - Settings</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 480px; margin: 40px auto; }
    label { display: block; margin-top: 16px; font-weight: 600; }
    input { width: 100%; padding: 8px; margin-top: 4px; box-sizing: border-box; }
    button { margin-top: 20px; padding: 10px 16px; cursor: pointer; }
    .hint { font-size: 12px; color: #666; }
    #status { margin-top: 10px; color: green; }
  </style>
</head>
<body>
  <h2>Mindful Feed Settings</h2>

  <label for="youtubeApiKey">YouTube Data API v3 Key</label>
  <input type="text" id="youtubeApiKey" placeholder="AIza..." />
  <p class="hint">Needed to fetch description, tags, likes, subscriber count, and top
    comments for a video. Create one for free in the Google Cloud Console
    (enable "YouTube Data API v3").</p>

  <label for="backendUrl">Backend URL</label>
  <input type="text" id="backendUrl" placeholder="http://localhost:5000" />
  <p class="hint">Where the Flask backend from this project is running.</p>

  <button id="saveBtn">Save</button>
  <div id="status"></div>

  <script src="options.js"></script>
</body>
</html>
